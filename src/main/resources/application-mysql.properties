# ============================================================
# MySQL profile — activate with one of:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=mysql
#   java -jar teilr.jar --spring.profiles.active=mysql
#   SPRING_PROFILES_ACTIVE=mysql
#
# Host / database / credentials can still be overridden with the
# DB_URL, DB_USERNAME and DB_PASSWORD environment variables.
# Without this profile the app uses the in-memory H2 database
# configured in application.properties.
# ============================================================

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/teilr?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# H2 console is irrelevant on MySQL.
spring.h2.console.enabled=false
