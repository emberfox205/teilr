spring.application.name=teilr
spring.thymeleaf.cache=false

# Mail is optional. If no SMTP host is configured the MailService falls back to
# logging the verification link to the console so the dev flow still works.
# Configure these in application-local.properties or via env vars for real email.
# spring.mail.host=smtp.example.com
# spring.mail.port=587
# spring.mail.username=
# spring.mail.password=
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Database — H2 in-memory by default (no server needed).
# To use MySQL instead, run with the "mysql" profile (see
# application-mysql.properties): -Dspring-boot.run.profiles=mysql
# All values below can also be overridden with DB_* environment variables.
spring.datasource.url=${DB_URL:jdbc:h2:mem:teilr;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 browser console: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Base URL used to build the verification link inside the confirmation email.
app.base-url=http://localhost:8080
app.mail.from=no-reply@teilr.local