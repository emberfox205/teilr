<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/auth-frame :: head('teilr · create account')}"></head>
<body>

<div th:replace="~{fragments/auth-frame :: desktop-block}"></div>

<main class="smartphone-only min-h-screen w-full flex-col justify-between px-6 py-10"
      style="max-width: 480px; margin: 0 auto;">

    <header class="flex items-center justify-between">
        <div class="teilr-mark">
            <span class="dot"></span>
            <span>teilr</span>
        </div>
        <a th:href="@{/auth/login}" class="text-xs uppercase tracking-[0.18em]"
           style="color: var(--teilr-mute);">have an account? sign in →</a>
    </header>

    <section class="mt-10 mb-8">
        <p class="teilr-label mb-3">join teilr</p>
        <h1 class="display-font text-5xl leading-[1.0] mb-3">
            three fields,<br>
            <em style="color: var(--teilr-coral);">one tiny ID.</em>
        </h1>
        <p class="text-sm" style="color: var(--teilr-mute);">
            We'll mint a 4-digit code so friends can find you. Pick your handle
            (it doesn't have to be unique) and a password.
        </p>
    </section>

    <div th:if="${errorMessage}" role="alert"
         class="mb-5 px-4 py-3 text-sm rounded-2xl"
         style="background: rgba(226,106,74,0.12); color: #8a2e16; border: 1px solid rgba(226,106,74,0.3);"
         th:text="${errorMessage}">error</div>

    <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post"
          class="flex flex-col gap-7" novalidate>

        <label class="flex flex-col gap-2">
            <span class="teilr-label">email</span>
            <input class="teilr-input" type="email" th:field="*{email}"
                   autocomplete="email" placeholder="you@domain.com" required>
            <span class="text-xs mt-0.5" style="color: var(--teilr-coral);"
                  th:if="${#fields.hasErrors('email')}" th:errors="*{email}">email error</span>
        </label>

        <label class="flex flex-col gap-2">
            <span class="teilr-label">username <em class="not-italic normal-case opacity-60" style="letter-spacing:0;">(any name works)</em></span>
            <input class="teilr-input" type="text" th:field="*{username}"
                   autocomplete="nickname" placeholder="alex" required>
            <span class="text-xs mt-0.5" style="color: var(--teilr-coral);"
                  th:if="${#fields.hasErrors('username')}" th:errors="*{username}">username error</span>
        </label>

        <label class="flex flex-col gap-2">
            <span class="teilr-label">password</span>
            <input class="teilr-input" type="password" th:field="*{password}"
                   autocomplete="new-password" placeholder="at least 6 characters" required>
            <span class="text-xs mt-0.5" style="color: var(--teilr-coral);"
                  th:if="${#fields.hasErrors('password')}" th:errors="*{password}">password error</span>
        </label>

        <button type="submit" class="teilr-btn mt-2">
            send confirmation link
            <span aria-hidden="true">✉</span>
        </button>
    </form>

    <footer class="mt-auto pt-10 text-center text-xs uppercase tracking-[0.18em]"
            style="color: var(--teilr-mute);">
        by signing up you agree to <span style="color: var(--teilr-ink);">share fairly</span>.
    </footer>
</main>

</body>
</html>
