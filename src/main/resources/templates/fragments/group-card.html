<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- One group tile. Tapping opens the full group-detail scene. -->
<div th:fragment="groupCardContent(group)"
     class="card card-border bg-base-100 cursor-pointer hover:bg-base-200 transition-colors"
     th:hx-get="@{'/api/groups/' + ${group.id} + '/view'}"
     hx-target="#app-scene" hx-swap="innerHTML">
    <div class="card-body flex-row items-center gap-3 p-4">
        <div class="avatar avatar-placeholder">
            <div class="bg-primary/10 text-primary w-9 rounded-full">
                <iconify-icon icon="carbon:group" width="18"></iconify-icon>
            </div>
        </div>
        <div class="flex-1 min-w-0">
            <p class="font-medium truncate" th:text="${group.name}">Group name</p>
            <p class="text-xs text-base-content/50">Open group</p>
        </div>
        <iconify-icon icon="carbon:chevron-right" width="20" class="text-base-content/40"></iconify-icon>
    </div>
</div>

</body>
</html>
