<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title th:text="${title} ?: 'teilr'">teilr</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style th:inline="none">
        :root {
            --teilr-cream: #f6f1e8;
            --teilr-ink:   #1f2a25;
            --teilr-teal:  #0f7a6b;
            --teilr-coral: #e26a4a;
            --teilr-mute:  #6f7a72;
        }
        html, body {
            background: var(--teilr-cream);
            color: var(--teilr-ink);
            font-family: 'Manrope', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            height: 100%;
        }
        .display-font { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; letter-spacing: -0.02em; }
        .grain::before {
            content: "";
            position: absolute; inset: 0;
            pointer-events: none;
            background-image: radial-gradient(rgba(31,42,37,0.07) 1px, transparent 1px);
            background-size: 3px 3px;
            mix-blend-mode: multiply;
            opacity: 0.6;
        }
        .teilr-input {
            background: transparent;
            border: none;
            border-bottom: 1.5px solid rgba(31,42,37,0.18);
            border-radius: 0;
            padding: 0.65rem 0.1rem;
            font-size: 1rem;
            transition: border-color 0.2s ease;
            width: 100%;
            color: var(--teilr-ink);
        }
        .teilr-input:focus {
            outline: none;
            border-bottom-color: var(--teilr-teal);
        }
        .teilr-input::placeholder { color: rgba(31,42,37,0.35); }
        .teilr-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--teilr-mute);
        }
        .teilr-btn {
            background: var(--teilr-ink);
            color: var(--teilr-cream);
            border-radius: 999px;
            padding: 0.95rem 1.25rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: transform 0.15s ease, background 0.2s ease;
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: none;
            cursor: pointer;
        }
        .teilr-btn:hover { background: var(--teilr-teal); transform: translateY(-1px); }
        .teilr-btn:active { transform: translateY(0); }
        .teilr-link {
            color: var(--teilr-teal);
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-thickness: 1.5px;
        }
        .teilr-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--teilr-teal);
            background: rgba(15,122,107,0.08);
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
        }
        .teilr-mark {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-family: 'Fraunces', serif;
            font-weight: 500;
            font-size: 1.6rem;
            letter-spacing: -0.02em;
        }
        .teilr-mark .dot {
            width: 0.55rem; height: 0.55rem; border-radius: 999px;
            background: var(--teilr-coral);
            box-shadow: 0 0 0 4px rgba(226,106,74,0.18);
        }

        /* Smartphone-only gate: hide app on viewports wider than ~480px */
        .smartphone-only { display: flex; }
        .desktop-block   { display: none; }
        @media (min-width: 481px) {
            .smartphone-only { display: none !important; }
            .desktop-block   { display: flex !important; }
        }
    </style>
</head>
<body>

<!-- Block shown on non-smartphone widths -->
<div th:fragment="desktop-block" class="desktop-block fixed inset-0 z-50 items-center justify-center p-10"
     style="background: var(--teilr-cream);">
    <div class="grain relative max-w-md text-center">
        <div class="teilr-mark justify-center mb-6">
            <span class="dot"></span>
            <span>teilr</span>
        </div>
        <p class="teilr-chip mb-6">mobile only</p>
        <h1 class="display-font text-4xl leading-[1.05] mb-4">
            this lives in your <em>pocket</em>, not your desktop.
        </h1>
        <p class="text-base" style="color: var(--teilr-mute);">
            teilr is designed for a smartphone-sized window. Open this page on a phone, or
            shrink your browser to under 480 px wide to continue.
        </p>
        <div class="mt-8 flex items-center justify-center gap-2 text-xs uppercase tracking-[0.2em]" style="color: var(--teilr-mute);">
            <span style="width:24px;height:1px;background:rgba(31,42,37,0.25);"></span>
            <span>resize · rotate · reload</span>
            <span style="width:24px;height:1px;background:rgba(31,42,37,0.25);"></span>
        </div>
    </div>
</div>

</body>
</html>
