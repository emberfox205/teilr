<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Bottom-sheet form to create a group. Loaded into #sheet, open immediately. -->
<div th:fragment="groupFormContent" class="modal modal-open modal-bottom"
     onclick="if(event.target===this){ document.getElementById('sheet').innerHTML=''; }">
    <div class="modal-box">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold">New group</h3>
            <button type="button" class="btn btn-sm btn-circle btn-ghost" aria-label="Close"
                    onclick="document.getElementById('sheet').innerHTML=''">
                <iconify-icon icon="carbon:close" width="20"></iconify-icon>
            </button>
        </div>

        <!--
          The form holds the name + chosen-member chips. The member pickers
          (friends checkboxes, add-by-ID) live OUTSIDE the form and reference it
          with form="group-form" so their HTMX load events do not bubble into the
          form's after-request handler (which would otherwise close the sheet).
        -->
        <form id="group-form"
              hx-post="/api/groups" hx-swap="none"
              hx-on:htmx:after-request="if(event.target===this && event.detail.successful){document.getElementById('sheet').innerHTML='';htmx.trigger(document.body,'refreshGroups');}">
            <fieldset class="fieldset">
                <legend class="fieldset-legend">Group name</legend>
                <input class="input w-full" type="text" name="name" required autofocus placeholder="Group name">
            </fieldset>

            <p class="text-xs font-semibold uppercase tracking-wide text-base-content/50 mt-3 mb-2">Members</p>
            <div id="chosen-members" class="flex flex-wrap gap-2 mb-2">
                <span class="text-xs text-base-content/60" id="chosen-empty">You are added automatically. Add others below.</span>
            </div>
        </form>

        <!-- friends quick-pick (checkboxes, name=memberIds) -->
        <div hx-get="/api/friends" hx-vals='{"selectable":"true"}'
             hx-trigger="load" hx-target="this" hx-swap="innerHTML" class="mb-4"></div>

        <!-- add by 4-digit ID -->
        <div class="card card-border bg-base-100 mb-4">
            <div class="card-body p-4 gap-2">
                <label class="text-sm font-medium">Add by 4-digit ID</label>
                <input class="input w-full" type="number" min="0" max="9999" name="userId" placeholder="0000"
                       hx-get="/api/users/search"
                       hx-trigger="input changed delay:350ms"
                       hx-target="#group-member-search"
                       hx-vals='{"context":"newGroup"}'
                       hx-include="this">
                <div id="group-member-search"></div>
            </div>
        </div>

        <button type="submit" form="group-form" class="btn btn-primary btn-block">
            <iconify-icon icon="carbon:add" width="20"></iconify-icon> Create group
        </button>
    </div>

    <script th:inline="none">
        // Add a member chip + hidden input to the group form (called from search result).
        window.teilrAddMember = function (id, name) {
            var box = document.getElementById('chosen-members');
            if (!box) return;
            if (box.querySelector('[data-mid="' + id + '"]')) return; // already added
            var empty = document.getElementById('chosen-empty');
            if (empty) empty.remove();

            var chip = document.createElement('span');
            chip.setAttribute('data-mid', id);
            chip.className = 'badge badge-neutral badge-lg gap-1';
            chip.innerHTML = '<span></span>' +
                '<button type="button" class="cursor-pointer" aria-label="Remove">' +
                '<iconify-icon icon="carbon:close"></iconify-icon></button>' +
                '<input type="hidden" name="memberIds" value="' + id + '" form="group-form">';
            chip.querySelector('span').textContent = name + ' · #' + String(id).padStart(4, '0');
            chip.querySelector('button').onclick = function () { chip.remove(); };
            box.appendChild(chip);

            var res = document.getElementById('group-member-search');
            if (res) res.innerHTML = '';
        };
    </script>
</div>

</body>
</html>
