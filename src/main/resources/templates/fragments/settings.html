<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Minimal settings scene (kept so the /ui/settings route resolves). -->
<div th:fragment="sceneContent">
    <h1 class="text-2xl font-semibold mb-6">Settings</h1>
    <div class="card card-border bg-base-100 mb-4">
        <div class="card-body p-4">
            <p class="text-xs text-base-content/50">About</p>
            <p class="text-sm">teilr — split bills with your groups.</p>
            <p class="text-xs text-base-content/50">Beta</p>
        </div>
    </div>
    <form th:action="@{/auth/logout}" method="post">
        <button type="submit" class="btn btn-outline btn-block">
            <iconify-icon icon="carbon:logout" width="18"></iconify-icon> Log out
        </button>
    </form>
</div>

</body>
</html>
