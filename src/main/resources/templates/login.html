<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/auth-frame :: head('teilr · Sign in')}"></head>
<body>

<div th:replace="~{fragments/auth-frame :: desktop-block}"></div>

<main class="smartphone-only min-h-screen w-full flex-col justify-between gap-8 px-6 py-10"
      style="max-width: 600px; margin: 0 auto;">

    <header class="flex items-center justify-between">
        <div class="flex items-center gap-2 text-xl font-semibold">
            <iconify-icon icon="carbon:money" width="20" class="text-primary"></iconify-icon>
            <span>teilr</span>
        </div>
        <span class="badge badge-soft">Beta</span>
    </header>

    <section>
        <h1 class="text-3xl font-semibold mb-2">Sign in</h1>
        <p class="text-base-content/60">Enter your details to continue.</p>
    </section>

    <div th:if="${errorMessage}" role="alert" class="alert alert-error alert-soft">
        <iconify-icon icon="carbon:warning" width="20"></iconify-icon>
        <span th:text="${errorMessage}">error</span>
    </div>
    <div th:if="${infoMessage}" role="status" class="alert alert-info alert-soft">
        <iconify-icon icon="carbon:information" width="20"></iconify-icon>
        <span th:text="${infoMessage}">info</span>
    </div>

    <form th:action="@{/auth/login}" method="post" class="flex flex-col gap-4">
        <fieldset class="fieldset">
            <legend class="fieldset-legend">Email or 4-digit ID</legend>
            <input class="input w-full" type="text" name="username" autocomplete="username"
                   placeholder="you@email.com or 0000" required autofocus>
        </fieldset>

        <fieldset class="fieldset">
            <legend class="fieldset-legend">Password</legend>
            <input class="input w-full" type="password" name="password" autocomplete="current-password"
                   placeholder="Password" required>
        </fieldset>

        <button type="submit" class="btn btn-primary btn-block mt-2">
            Sign in
            <iconify-icon icon="carbon:arrow-right" width="20"></iconify-icon>
        </button>
    </form>

    <footer class="mt-auto text-center text-sm text-base-content/60">
        Don't have an account?
        <a th:href="@{/auth/register}" class="link link-primary ml-1">Create one</a>
    </footer>
</main>

</body>
</html>
