<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/auth-frame :: head('teilr · Check your inbox')}"></head>
<body>

<div th:replace="~{fragments/auth-frame :: desktop-block}"></div>

<main class="smartphone-only min-h-screen w-full flex-col justify-between gap-8 px-6 py-10"
      style="max-width: 600px; margin: 0 auto;">

    <header class="flex items-center justify-between">
        <div class="flex items-center gap-2 text-xl font-semibold">
            <iconify-icon icon="carbon:money" width="20" class="text-primary"></iconify-icon>
            <span>teilr</span>
        </div>
        <span id="status-badge" class="badge badge-soft">Pending</span>
    </header>

    <section>
        <p class="text-base-content/60 mb-1">Your 4-digit ID</p>
        <p class="text-6xl font-bold text-primary mb-6">#<span th:text="${userId}">0000</span></p>
        <h1 id="status-title" class="text-2xl font-semibold mb-2">Confirm your email</h1>
        <p id="status-desc" class="text-base-content/70">
            We sent a link to <span class="font-medium text-base-content" th:text="${email}">you@email.com</span>.
            Open it to activate your account, then sign in.
        </p>
    </section>

    <div role="alert" class="alert alert-info alert-soft" id="status-alert">
        <iconify-icon icon="carbon:information" width="20"></iconify-icon>
        <span>Can't find it? Check spam. In development the link is also printed to the server log.</span>
    </div>

    <footer class="mt-auto">
        <a th:href="@{/auth/login}" class="btn btn-primary btn-block">
            Back to sign in
            <iconify-icon icon="carbon:arrow-right" width="20"></iconify-icon>
        </a>
    </footer>
</main>

<script th:inline="javascript">
    const rawUserId = /*[[${rawUserId}]]*/ null;
    if (rawUserId) {
        let pollInterval = setInterval(function() {
            fetch('/auth/status?id=' + rawUserId)
                .then(r => r.text())
                .then(text => {
                    if (text === 'VERIFIED') {
                        clearInterval(pollInterval); // Stop polling

                        // Update the UI so the user sees it is verified
                        document.getElementById('status-badge').outerHTML = '<span class="badge badge-success badge-soft gap-1"><iconify-icon icon="carbon:checkmark" width="14"></iconify-icon> Verified</span>';
                        document.getElementById('status-title').innerText = 'Account confirmed!';
                        document.getElementById('status-desc').innerText = 'Redirecting to login...';
                        document.getElementById('status-alert').style.display = 'none';

                        // Wait 2.5 seconds, then redirect
                        setTimeout(() => {
                            window.location.href = '/auth/login?verified=true';
                        }, 2000);
                    }
                });
        }, 2000);
    }
</script>
</body>
</html>
